# Render Blueprint — deploys PROTACselect as a public web service.
# In Render: New + -> Blueprint -> connect this repo -> Apply.
services:
  - type: web
    name: protacselect
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir webapp app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
